spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/eventhub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDev12345678901234567890}
  access-token-expiration: 900000      # 15 phút (milliseconds)
  refresh-token-expiration: 604800000  # 7 ngày  (milliseconds)

server:
  port: ${SERVER_PORT:8080}
